  <body>
    <main>
      <h1>Diatonic Major Scales</h1>

      <!-- Pattern Number Selector (centered at top) -->
      <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 20px;">
        <div style="margin-bottom: 10px; font-weight: bold;">Pattern:</div>
        <div id="pattern-select" class="pattern-radio-group">
          <input type="radio" id="pattern-1" name="pattern" value="1">
          <label for="pattern-1">1</label>

          <input type="radio" id="pattern-2" name="pattern" value="2">
          <label for="pattern-2">2</label>

          <input type="radio" id="pattern-3" name="pattern" value="3" checked>
          <label for="pattern-3">3</label>

          <input type="radio" id="pattern-4" name="pattern" value="4">
          <label for="pattern-4">4</label>

          <input type="radio" id="pattern-5" name="pattern" value="5">
          <label for="pattern-5">5</label>

          <input type="radio" id="pattern-6" name="pattern" value="6">
          <label for="pattern-6">6</label>

          <input type="radio" id="pattern-7" name="pattern" value="7">
          <label for="pattern-7">7</label>

          <input type="radio" id="pattern-8" name="pattern" value="8">
          <label for="pattern-8">8</label>

          <input type="radio" id="pattern-9" name="pattern" value="9">
          <label for="pattern-9">9</label>

          <input type="radio" id="pattern-10" name="pattern" value="10">
          <label for="pattern-10">10</label>

          <input type="radio" id="pattern-11" name="pattern" value="11">
          <label for="pattern-11">11</label>

          <input type="radio" id="pattern-12" name="pattern" value="12">
          <label for="pattern-12">12</label>
        </div>
      </div>

      <div style="display: flex; gap: 20px; align-items: flex-start; justify-content: center;">
        <!-- First Chart -->
        <div style="flex: 0 1 auto;">
          <div class="mode-selector-dropdown" data-chart="1">
            <div class="mode-selector-label">
              <span class="mode-name">Ionian</span> <span class="pattern-number">3</span>
            </div>
            <div class="mode-selector-options">
              <input type="radio" id="mode-1-ionian" name="mode-1" value="ionian" checked>
              <label for="mode-1-ionian">Ionian</label>

              <input type="radio" id="mode-1-lydian" name="mode-1" value="lydian">
              <label for="mode-1-lydian">Lydian</label>

              <input type="radio" id="mode-1-mixolydian" name="mode-1" value="mixolydian">
              <label for="mode-1-mixolydian">Mixolydian</label>
            </div>
          </div>
          <div id="scales-container-1"></div>
        </div>

        <!-- Second Chart -->
        <div style="flex: 0 1 auto;">
          <div class="mode-selector-dropdown" data-chart="2">
            <div class="mode-selector-label">
              <span class="mode-name">Lydian</span> <span class="pattern-number">3</span>
            </div>
            <div class="mode-selector-options">
              <input type="radio" id="mode-2-ionian" name="mode-2" value="ionian">
              <label for="mode-2-ionian">Ionian</label>

              <input type="radio" id="mode-2-lydian" name="mode-2" value="lydian" checked>
              <label for="mode-2-lydian">Lydian</label>

              <input type="radio" id="mode-2-mixolydian" name="mode-2" value="mixolydian">
              <label for="mode-2-mixolydian">Mixolydian</label>
            </div>
          </div>
          <div id="scales-container-2"></div>
        </div>

        <!-- Third Chart -->
        <div style="flex: 0 1 auto;">
          <div class="mode-selector-dropdown" data-chart="3">
            <div class="mode-selector-label">
              <span class="mode-name">Mixolydian</span> <span class="pattern-number">3</span>
            </div>
            <div class="mode-selector-options">
              <input type="radio" id="mode-3-ionian" name="mode-3" value="ionian">
              <label for="mode-3-ionian">Ionian</label>

              <input type="radio" id="mode-3-lydian" name="mode-3" value="lydian">
              <label for="mode-3-lydian">Lydian</label>

              <input type="radio" id="mode-3-mixolydian" name="mode-3" value="mixolydian" checked>
              <label for="mode-3-mixolydian">Mixolydian</label>
            </div>
          </div>
          <div id="scales-container-3"></div>
        </div>
      </div>
    </main>
